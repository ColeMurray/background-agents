{{/*
RBAC for the cleanup CronJob. Install once in the namespace.
*/}}
{{- if eq .Release.Name "sandbox-cleanup" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-cleanup
  labels:
    app.kubernetes.io/name: sandbox-cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-cleanup
subjects:
  - kind: ServiceAccount
    name: sandbox-cleanup
roleRef:
  kind: Role
  name: sandbox-cleanup
  apiGroup: rbac.authorization.k8s.io
{{- end }}
