apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sandbox.fullname" . }}-secrets
  labels:
    {{- include "sandbox.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.anthropicApiKey | quote }}
  SANDBOX_AUTH_TOKEN: {{ .Values.sandbox.sandboxAuthToken | quote }}
  VCS_CLONE_TOKEN: {{ .Values.git.cloneToken | quote }}
  {{- if .Values.cloudflareTunnel.tunnelToken }}
  TUNNEL_TOKEN: {{ .Values.cloudflareTunnel.tunnelToken | quote }}
  {{- end }}
  MINIO_ACCESS_KEY: {{ .Values.minio.accessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.secretKey | quote }}
