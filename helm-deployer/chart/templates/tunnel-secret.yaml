{{- if and .Values.cloudflareTunnel.enabled .Values.cloudflareTunnel.token.create (not .Values.cloudflareTunnel.token.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helm-deployer.fullname" . }}-tunnel
  labels:
    {{- include "helm-deployer.labels" . | nindent 4 }}
type: Opaque
stringData:
  TUNNEL_TOKEN: {{ required "values.cloudflareTunnel.token.value is required when cloudflareTunnel.enabled=true and no existing secret is configured" .Values.cloudflareTunnel.token.value | quote }}
{{- end }}
