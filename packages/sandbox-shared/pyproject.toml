[project]
name = "open-inspect-sandbox-shared"
version = "0.1.0"
description = "Shared utilities for Open-Inspect sandbox providers (auth, types, logging, bridge)"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0",
    "PyJWT[crypto]>=2.0",
    "websockets>=12.0",
]

[tool.setuptools.packages.find]
include = ["sandbox_shared*"]
